<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>本科生的数学六卷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Six Volumes of Mathematics for Undergraduates — by Xujiang Tang">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- KaTeX 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #2c3e50;
      --sidebar-width: 280px;
      --sidebar-background: #f8f9fa;
    }
    .markdown-section h1 {
      border-bottom: 2px solid #2c3e50;
      padding-bottom: 0.3em;
    }
    .markdown-section h2 {
      border-bottom: 1px solid #eaecef;
      padding-bottom: 0.2em;
    }
    .sidebar-nav li a {
      font-size: 14px;
    }
    /* KaTeX 公式居中显示 */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
    }
    .app-name-link {
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>

  <script>
    window.$docsify = {
      name: '本科生的数学六卷',
      nameLink: '/',
      repo: 'https://github.com/TXJ2006/math-six-volumes',
      loadSidebar: true,       // 使用 _sidebar.md 自定义侧边栏
      subMaxLevel: 3,          // 侧边栏显示到 h3
      auto2top: true,          // 切换页面自动滚到顶部
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        depth: 3
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制'
      }
    }
  </script>

  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- 上下页翻页插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- 代码复制插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- KaTeX -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <!-- Docsify KaTeX 插件：渲染 $...$ 和 $$...$$ -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.js"></script>

</body>
</html>

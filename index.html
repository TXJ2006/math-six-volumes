<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <title>本科生的数学六卷</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="数学全书：从本科到博士的十六卷 — by Xujiang Tang">

  <!-- Docsify 主题 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/docsify-themeable@0/dist/css/theme-simple.css">

  <!-- KaTeX 样式 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">

  <!-- Google Fonts: Noto Serif SC (宋体/衬线) -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap">

  <style>
    :root {
      --base-font-size: 16px;
      --theme-color: #2e7d32;
      --sidebar-width: 300px;
      --sidebar-background: #fafafa;
      /* 定义框配色 */
      --box-green-bg: #e8f5e9;
      --box-green-border: #2e7d32;
      --box-blue-bg: #e3f2fd;
      --box-blue-border: #1565c0;
      --box-orange-bg: #fff3e0;
      --box-orange-border: #e65100;
      --box-purple-bg: #f3e5f5;
      --box-purple-border: #6a1b9a;
      --box-gray-bg: #f5f5f5;
      --box-gray-border: #616161;
    }

    /* ===== 全局字体：衬线体（模拟教材排版） ===== */
    body, .markdown-section {
      font-family: 'Noto Serif SC', 'Source Han Serif SC', 'SimSun', 'STSong', Georgia, 'Times New Roman', serif;
      color: #1a1a1a;
      line-height: 1.85;
    }

    .markdown-section {
      font-size: 16.5px;
      max-width: 880px;
    }

    /* ===== 标题样式 ===== */
    .markdown-section h1 {
      font-weight: 700;
      font-size: 1.75em;
      border-bottom: 2.5px solid var(--box-green-border);
      padding-bottom: 0.3em;
      color: #1b5e20;
    }
    .markdown-section h2 {
      font-weight: 700;
      font-size: 1.35em;
      border-bottom: 1px solid #c8e6c9;
      padding-bottom: 0.2em;
      color: #2e7d32;
    }
    .markdown-section h3 {
      font-weight: 600;
      font-size: 1.15em;
      color: #33691e;
    }

    /* ===== 引用块 → 绿色定义/定理框 ===== */
    .markdown-section blockquote {
      background: var(--box-green-bg);
      border-left: 4px solid var(--box-green-border);
      border-radius: 0 6px 6px 0;
      padding: 14px 20px;
      margin: 1.2em 0;
      color: #1a1a1a;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .markdown-section blockquote p {
      margin: 0.4em 0;
      line-height: 1.8;
    }

    /* 嵌套引用（如果有的话）用蓝色 */
    .markdown-section blockquote blockquote {
      background: var(--box-blue-bg);
      border-left-color: var(--box-blue-border);
    }

    /* ===== 加粗关键词（Definition/定理/证明等）的颜色 ===== */
    .markdown-section blockquote strong {
      color: var(--box-green-border);
    }

    /* ===== 行内代码 ===== */
    .markdown-section code:not(.katex) {
      background: #e8f5e9;
      color: #1b5e20;
      padding: 2px 5px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    /* ===== 侧边栏 ===== */
    .sidebar-nav li a {
      font-size: 13.5px;
      font-family: 'Noto Serif SC', serif;
      color: #333;
    }
    .sidebar-nav li a:hover {
      color: var(--box-green-border);
    }
    .sidebar-nav li.active > a {
      color: var(--box-green-border);
      font-weight: 600;
    }
    .app-name-link {
      font-weight: 700;
      color: #1b5e20 !important;
    }

    /* ===== KaTeX 公式 ===== */
    .katex-display {
      overflow-x: auto;
      overflow-y: hidden;
      margin: 0.6em 0;
    }
    .katex {
      font-size: 1.05em;
    }

    /* ===== 表格 ===== */
    .markdown-section table {
      border-collapse: collapse;
      width: 100%;
    }
    .markdown-section table th {
      background: #e8f5e9;
      color: #1b5e20;
      font-weight: 600;
      border: 1px solid #a5d6a7;
      padding: 8px 12px;
    }
    .markdown-section table td {
      border: 1px solid #c8e6c9;
      padding: 8px 12px;
    }
    .markdown-section table tr:nth-child(even) {
      background: #f9fbe7;
    }

    /* ===== 水平分割线 ===== */
    .markdown-section hr {
      border: none;
      border-top: 1.5px solid #a5d6a7;
      margin: 2em 0;
    }

    /* ===== 强调文字 ===== */
    .markdown-section strong {
      color: #1b5e20;
    }
    .markdown-section em {
      color: #555;
    }
  </style>
</head>
<body>
  <div id="app">正在加载...</div>

  <script>
    window.$docsify = {
      name: '本科生的数学六卷',
      nameLink: '/',
      repo: 'https://github.com/TXJ2006/math-six-volumes',
      loadSidebar: true,       // 使用 _sidebar.md 自定义侧边栏
      subMaxLevel: 3,          // 侧边栏显示到 h3
      auto2top: true,          // 切换页面自动滚到顶部
      search: {
        placeholder: '搜索...',
        noData: '没有找到结果',
        depth: 3
      },
      pagination: {
        previousText: '上一章',
        nextText: '下一章',
        crossChapter: true
      },
      copyCode: {
        buttonText: '复制',
        successText: '已复制'
      }
    }
  </script>

  <!-- Docsify 核心 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/docsify.min.js"></script>

  <!-- 搜索插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify@4/lib/plugins/search.min.js"></script>

  <!-- 上下页翻页插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-pagination/dist/docsify-pagination.min.js"></script>

  <!-- 代码复制插件 -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-copy-code@2/dist/docsify-copy-code.min.js"></script>

  <!-- KaTeX -->
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

  <!-- Docsify KaTeX 插件：渲染 $...$ 和 $$...$$ -->
  <script src="https://cdn.jsdelivr.net/npm/docsify-katex@1.4.4/dist/docsify-katex.js"></script>

</body>
</html>
